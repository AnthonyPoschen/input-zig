name: CI

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        zig: ["0.16.0", "master"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux input dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libwayland-dev libxkbcommon-dev wayland-protocols
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}
      - run: zig build test
      - run: zig build debug-input -- --frames 1
